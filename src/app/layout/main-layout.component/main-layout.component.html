<div class="app-wrapper">

  <app-sidebar [collapsed]="isSidebarCollapsed()"></app-sidebar>
  <div class="main-container" [class.full-width]="isSidebarCollapsed()">
    <app-navbar (onToggle)="toggleSidebar()"></app-navbar>
    <main class="content">
      <router-outlet></router-outlet>
    </main>
    <app-footer></app-footer>
  </div>

  <div
    class="sidebar-overlay"
    [class.visible]="!isSidebarCollapsed()"
    (click)="toggleSidebar()"
    aria-hidden="true"
  ></div>

</div>
